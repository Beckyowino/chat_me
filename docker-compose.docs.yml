services:
  docs:
    image: chat_me_local_docs
    container_name: chat_me_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./chat_me:/app/chat_me:z
    ports:
      - '9000:9000'
    command: /start-docs
